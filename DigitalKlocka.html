<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matsedel + Klocka</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #clock {
      font-size: 120px;
      font-weight: bold;
    }

    #date {
      font-size: 24px;
      margin-bottom: 20px;
    }

    #lunch {
      font-size: 28px;
      text-align: center;
      max-width: 800px;
    }

    .meal {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div id="clock">--:--:--</div>
<div id="date"></div>
<div id="lunch">Laddar lunch...</div>

<script>
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('sv-SE');
  const date = now.toLocaleDateString('sv-SE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}

setInterval(updateClock, 1000);
updateClock();

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

async function loadLunch() {
  try {
    const response = await fetch('https://particle.se/AvestaMatsedel.json');
    const data = await response.json();

    const today = new Date();
    const week = getWeekNumber(today).toString();

    const weekdays = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];
    const todayName = weekdays[today.getDay()];

    const lunchDiv = document.getElementById('lunch');

    if (data.weeks[week] && data.weeks[week].veckodag[todayName]) {
      const meals = data.weeks[week].veckodag[todayName];
      lunchDiv.innerHTML = meals.map(m => `<div class="meal">${m}</div>`).join('');
    } else {
      lunchDiv.textContent = 'Ingen lunch hittades idag.';
    }
  } catch (err) {
    document.getElementById('lunch').textContent = 'Kunde inte ladda matsedel.';
    console.error(err);
  }
}

loadLunch();

// Uppdatera lunch var 5:e minut
setInterval(loadLunch, 5 * 60 * 1000);
</script>

</body>
</html>
