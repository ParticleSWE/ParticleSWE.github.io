<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gissa Årtalet</title>

<!-- Pixel font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CRT effect */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

.game {
    background: #020617;
    border: 4px solid #38bdf8;
    padding: 30px;
    text-align: center;
    width: 420px;
    box-shadow: 0 0 20px #38bdf8;
}

h1 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #38bdf8;
}

#question {
    font-size: 12px;
    min-height: 60px;
    margin-bottom: 20px;
}

input {
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    width: 160px;
    text-align: center;
    border: 3px solid #38bdf8;
    background: black;
    color: #38bdf8;
}

button {
    margin-top: 15px;
    font-family: inherit;
    font-size: 12px;
    padding: 12px 20px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.info {
    margin-top: 20px;
    font-size: 10px;
}

#feedback {
    margin-top: 10px;
    min-height: 20px;
}

.correct {
    color: #22c55e;
}

.wrong {
    color: #ef4444;
}

.hint {
    color: #facc15;
}
</style>
</head>

<body>

<div class="game">
    <h1>🎮 Yearly There!</h1>

    <p id="question">Laddar...</p>

    <input type="number" id="guess" placeholder="ÅRTAL">
    <br>
    <button onclick="submitGuess()">Gissa</button>

    <div class="info">
        <p id="feedback"></p>
        <p>Försök: <span id="attempts">3</span></p>
        <p>Streak: <span id="streak">0</span></p>
    </div>
</div>

<script>
let questions = [];
let currentQuestion = null;
let attemptsLeft = 3;
let streak = 0;

// Ladda frågor
fetch("https://particle.se/theQuestions.json")
    .then(res => res.json())
    .then(data => {
        questions = data;
        nextQuestion();
    });

// Slumpa fråga
function nextQuestion() {
    const index = Math.floor(Math.random() * questions.length);
    currentQuestion = questions[index];

    document.getElementById("question").innerText = currentQuestion.question;
    document.getElementById("feedback").innerText = "";
    document.getElementById("guess").value = "";

    attemptsLeft = 3;
    updateUI();
}

function updateUI() {
    document.getElementById("attempts").innerText = attemptsLeft;
    document.getElementById("streak").innerText = streak;
}

// Gissning
function submitGuess() {
    const guess = parseInt(document.getElementById("guess").value);
    if (isNaN(guess)) return;

    const feedback = document.getElementById("feedback");

    if (guess === currentQuestion.answer) {
        streak++;
        feedback.innerText = "✔ RÄTT!";
        feedback.className = "correct";
        setTimeout(nextQuestion, 1000);
        return;
    }

    attemptsLeft--;

    if (attemptsLeft <= 0) {
        feedback.innerText = "✖ FEL! SVAR: " + currentQuestion.answer;
        feedback.className = "wrong";
        streak = 0;
        setTimeout(nextQuestion, 2000);
    } else {
        if (guess < currentQuestion.answer) {
            feedback.innerText = "▲ FÖR LÅGT";
        } else {
            feedback.innerText = "▼ FÖR HÖGT";
        }
        feedback.className = "hint";
    }

    updateUI();
}
</script>

</body>
</html>
